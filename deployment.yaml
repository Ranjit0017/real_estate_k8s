apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-estate
  labels:
    app: real-estate

spec:
  replicas: 2

  selector:
    matchLabels:
      app: real-estate

  template:
    metadata:
      labels:
        app: real-estate

    spec:
      containers:
        - name: real-estate

          image: ranjitdockerdev/real-estate:41b934fcf12d0d6662855d094082cf5500d32de8

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20